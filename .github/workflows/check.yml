name: Check NixOS configurations
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
  pull_request:
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: nix
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for `nix flake show`
      - name: Flake check
        run: |
          nix develop --command just check
  fmt:
    runs-on: native
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for `nix flake show`
      - name: Flake check
        run: nix fmt -- --fail-on-change

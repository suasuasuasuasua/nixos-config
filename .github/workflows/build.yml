name: Build NixOS configurations
permissions:
  contents: read
on:
  push:
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
  pull_request:
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define each OS & configuration you want to build
        include:
          - config: lab
          - config: pi
      fail-fast: false # let all matrix jobs finish even if one fails
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for `nix flake show`
      - uses: extractions/setup-just@v4
        with:
          just-version: 1.43.1 # optional semver specification, otherwise latest
          github-token: "" # avoid using Gitea token against GitHub API
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - name: Install direnv
        run: |
          curl -sfL https://direnv.net/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Load environment variables
        run: |
          direnv allow .
          direnv export gha > "$GITHUB_ENV"
      - name: Build ${{ matrix.config }}
        run: |
          just build ${{matrix.config}}

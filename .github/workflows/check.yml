name: Check NixOS configurations
permissions:
  contents: read
on:
  push:
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
  pull_request:
    paths:
      - "**/*.nix"
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
jobs:
  build:
    runs-on: nix
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for `nix flake show`
      - name: Load environment variables
        run: |
          direnv allow .
          direnv export gha > "$GITHUB_ENV"
      - name: Flake check
        run: just check

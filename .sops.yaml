# https://github.com/Mic92/sops-nix
# .sops.yaml defines the keys
#
# https://github.com/Mic92/ssh-to-age
# Generate a private age key from a private ssh key
# - nix run nixpkgs#ssh-to-age -- -private-key -i $HOME/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt
# Generate a public age key from a public ssh key
# - nix run nixpkgs#ssh-to-age -- -i $HOME/.ssh/id_ed25519.pub -o pub-key.txt
#
# Deploying to a new VPS with nixos-anywhere (so SOPS works on first activation):
#
# 1. Pre-generate the SSH host key locally:
#    ssh-keygen -t ed25519 -f /tmp/ssh_host_ed25519_key -N ""
#
# 2. Convert to age pubkey and update &vps above:
#    nix run nixpkgs#ssh-to-age -- -i /tmp/ssh_host_ed25519_key.pub
#
# 3. Re-encrypt secrets with the new key:
#    sops updatekeys secrets/secrets.yaml
#
# 4. Stage the host key for nixos-anywhere:
#    mkdir -p /tmp/extra-files/etc/ssh
#    cp /tmp/ssh_host_ed25519_key /tmp/extra-files/etc/ssh/ssh_host_ed25519_key
#    chmod 600 /tmp/extra-files/etc/ssh/ssh_host_ed25519_key
#
# 5. Deploy:
#    nixos-anywhere --extra-files /tmp/extra-files --flake .#vps root@<ip>
keys:
  - &lab age1z873m77wql5652lewr95323ejpvl85fchwq22xg8yd6x4kperejqg9wlph
  - &pi age1l7pwlljdyq9jrtrl9c2sp2q0jt2kklydv03289ykpd9604susansvt2tjm
  - &hp-optiplex0 age1szgvv2wmmm2qljmndcqs3jx3zxdxu03xjf5x5kx4km0rzmrnjuksd3hy6y
  - &hetzner-cloud-vps0 age139f88emrmhu7wmx85zq0pn6y9h6f4rhwk7v2r5pze5jk82ye8vgqv4g6de
  - &hetzner-cloud-vps1 age1mgprnw502csh4qku7fqrhhpen9cqnt5rrx8xfkvkdfhvfhren9aq2fptus
creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
          - *pi
          - *hp-optiplex0
          - *hetzner-cloud-vps0
          - *hetzner-cloud-vps1
  - path_regex: configurations/nixos/lab/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
  - path_regex: configurations/nixos/pi/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
          - *pi
  - path_regex: configurations/nixos/hp-optiplex0/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
          - *hp-optiplex0
  - path_regex: configurations/nixos/hetzner-cloud-vps0/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
          - *hetzner-cloud-vps0
  - path_regex: configurations/nixos/hetzner-cloud-vps1/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *lab
          - *hetzner-cloud-vps1
